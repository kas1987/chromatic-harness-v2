# _AUTHORITY.yaml — machine-readable source-of-truth precedence.
#
# When two documents disagree, the one with the lower `rank` wins.
# Human-readable form: CHROMATIC_TREES.md §1. Consumed by governance checks
# (v3-governance epic) to detect and resolve authority conflicts in CI.
#
# Resolves the v2 audit finding: REPO_OPERATING_CONTRACT.md and
# CHROMATIC_HARNESS_MANIFEST.md both claimed to be authoritative.

version: 1
reconciled_at: "2026-06-02"

precedence:
  - rank: 1
    source: ".claude/CLAUDE.md"
    also: ["~/.claude/CLAUDE.md", "AGENTS.md"]
    governs: "Agent operating mandate, autonomy, security tiers (T1-T4)"
  - rank: 2
    source: "CHROMATIC_TREES.md"
    governs: "Repo structure, file locations, operation->file map"
  - rank: 3
    source: "00_SOURCE_OF_TRUTH/CHROMATIC_HARNESS_MANIFEST.md"
    governs: "Harness identity and canonical components"
  - rank: 4
    source: "01_PROTOCOLS/**"
    governs: "Interface contracts and JSON schemas (BEADS, CMP, MAGNETS, MCP, INTAKE)"
  - rank: 5
    source: "08_PDRS/**"
    governs: "Per-feature design decisions"
  - rank: 6
    source: "04_PLAYBOOKS/**"
    governs: "Role and workflow runbooks"
  - rank: 7
    source: "00_META/REPO_OPERATING_CONTRACT.md"
    governs: "Repo ownership/branch metadata (subordinate to the manifest)"
  - rank: 8
    source: "registry/**, **/*_registry.json"
    governs: "Generated/derived state — never overrides ranks 1-7"

# Operational behavior (not structure) is defined by:
operations_entrypoint: "AGENT_OPERATIONS.md"

# A generated artifact must never claim authority over a higher-ranked source.
# CI check (v3-governance): fail if a file at rank N asserts precedence over rank <N.
