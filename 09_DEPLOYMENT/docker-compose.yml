services:
  chromatic-api:
    build: .
    env_file:
      - .env
    volumes:
      - ../:/workspace
    ports:
      - "8787:8787"

  chromatic-console:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ../05_FRONTEND_CONSOLE:/app
    ports:
      - "3000:3000"
