services:
  chromatic-api:
    build:
      context: ..
      dockerfile: 09_DEPLOYMENT/Dockerfile
    env_file:
      - .env
    volumes:
      - ..:/workspace
      - harness-data:/workspace/06_DATA
    ports:
      - "127.0.0.1:8787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chromatic-console:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --port 3030"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8787
    volumes:
      - ../05_FRONTEND_CONSOLE:/app
    ports:
      - "127.0.0.1:3030:3030"

volumes:
  harness-data:
