services:
  chromatic-api:
    build:
      context: ..
      dockerfile: 09_DEPLOYMENT/Dockerfile
    env_file:
      - .env
    volumes:
      - ..:/workspace
      - harness-data:/workspace/06_DATA
    ports:
      - "127.0.0.1:8787:8787"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  chromatic-console:
    build:
      context: ..
      dockerfile: 09_DEPLOYMENT/Dockerfile.console
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8787
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8787
    ports:
      - "127.0.0.1:3030:3030"
    depends_on:
      - chromatic-api

volumes:
  harness-data:
