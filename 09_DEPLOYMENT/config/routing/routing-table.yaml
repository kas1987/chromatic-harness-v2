# Routing table: context × speed_mode × C-level → ordered provider list
# The provider_selector reads this and returns the first reachable provider.

version: 2

# ── Laptop (no GPU) ─────────────────────────────────────────────────────────
context_laptop:
  speed:
    C1: [ollama_local:llama3.2:3b, gemini:gemini-2.5-flash, native_claude]
    C2: [gemini:gemini-2.5-flash, openai:gpt-4o-mini, ollama_local:qwen2.5-coder:14b]
    C3: [gemini:gemini-2.5-pro, claude_api:sonnet, native_claude]
    C4: [claude_api:sonnet, gemini:gemini-2.5-pro, native_claude]

  balance:
    C1: [ollama_local:llama3.2:3b, ollama_local:qwen2.5-coder:14b]
    C2: [ollama_local:qwen2.5-coder:14b, gemini:gemini-2.5-flash]
    C3: [gemini:gemini-2.5-pro, claude_api:sonnet]
    C4: [gemini:gemini-2.5-pro, claude_api:sonnet, native_claude]

  low:
    C1: [ollama_local:llama3.2:3b]
    C2: [ollama_local:qwen2.5-coder:14b]
    C3: [ollama_local:qwen2.5-coder:14b, gemini:gemini-2.5-pro]
    C4: [ollama_local:qwen2.5-coder:14b, gemini:gemini-2.5-pro]

# ── Laptop + Remote Desktop on LAN ─────────────────────────────────────────
context_laptop_remote:
  speed:
    C1: [ollama_local:llama3.2:3b, gemini:gemini-2.5-flash]
    C2: [ollama_remote_desktop:qwen2.5-coder:14b, gemini:gemini-2.5-flash]
    C3: [ollama_remote_desktop:qwen2.5-coder:14b, gemini:gemini-2.5-pro]
    C4: [gemini:gemini-2.5-pro, claude_api:sonnet]

  balance:
    C1: [ollama_local:llama3.2:3b]
    C2: [ollama_remote_desktop:llama3.1:8b, ollama_local:qwen2.5-coder:14b]
    C3: [ollama_remote_desktop:qwen2.5-coder:14b, gemini:gemini-2.5-pro]
    C4: [gemini:gemini-2.5-pro, claude_api:sonnet]

  low:
    C1: [ollama_local:llama3.2:3b]
    C2: [ollama_remote_desktop:llama3.1:8b, ollama_local:qwen2.5-coder:14b]
    C3: [ollama_remote_desktop:qwen2.5-coder:14b, ollama_local:qwen2.5-coder:14b]
    C4: [ollama_remote_desktop:gemma2:27b, ollama_remote_desktop:qwen2.5-coder:14b]

# ── Desktop (RTX 4070, GPU inference) ──────────────────────────────────────
context_desktop:
  speed:
    C1: [ollama_local:llama3.1:8b, gemini:gemini-2.5-flash]
    C2: [ollama_local:llama3.1:8b, gemini:gemini-2.5-flash]
    C3: [ollama_local:qwen2.5-coder:14b, gemini:gemini-2.5-pro]
    C4: [gemini:gemini-2.5-pro, claude_api:sonnet]

  balance:
    C1: [ollama_local:llama3.1:8b]
    C2: [ollama_local:llama3.1:8b, ollama_local:qwen2.5-coder:14b]
    C3: [ollama_local:qwen2.5-coder:14b, ollama_local:gemma2:9b]
    C4: [gemini:gemini-2.5-pro, claude_api:sonnet]

  low:
    C1: [ollama_local:llama3.1:8b]
    C2: [ollama_local:llama3.1:8b]
    C3: [ollama_local:qwen2.5-coder:14b]
    C4: [ollama_local:gemma2:9b, ollama_local:qwen2.5-coder:14b]

# ── Server / always-on machine ─────────────────────────────────────────────
context_server:
  speed:
    C1: [ollama_local:llama3.1:8b]
    C2: [ollama_local:qwen2.5-coder:14b]
    C3: [ollama_local:gemma2:27b, gemini:gemini-2.5-pro]
    C4: [claude_api:sonnet, gemini:gemini-2.5-pro]

  balance:
    C1: [ollama_local:llama3.1:8b]
    C2: [ollama_local:qwen2.5-coder:14b]
    C3: [ollama_local:qwen2.5-coder:14b]
    C4: [ollama_local:gemma2:27b, gemini:gemini-2.5-pro]

  low:
    C1: [ollama_local:llama3.1:8b]
    C2: [ollama_local:qwen2.5-coder:14b]
    C3: [ollama_local:qwen2.5-coder:14b]
    C4: [ollama_local:gemma2:27b]
