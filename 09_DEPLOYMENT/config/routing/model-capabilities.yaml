# Model Capability Registry
# Evolves based on: official docs, community benchmarks, personal observations.
# The router uses this to fine-tune routing beyond the static routing table.

version: 2

# ── Capability dimensions ───────────────────────────────────────────────────
dimensions:
  - coding       # Code generation, review, refactoring, debugging
  - reasoning    # Multi-step logic, math, analysis, root-cause
  - creativity   # Novel ideas, brainstorming, design trade-offs
  - speed        # Low latency, fast streaming
  - context      # Long-context comprehension (128K+ tokens)
  - instruction  # Following complex multi-part instructions
  - vision       # Image understanding, multimodal tasks

# ── Model profiles ──────────────────────────────────────────────────────────
models:
