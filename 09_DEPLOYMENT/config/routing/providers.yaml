providers:
  ollama:
    type: local
    enabled: true
    base_url: http://localhost:11434
    privacy_max: P2

  lmstudio:
    type: local
    enabled: true
    base_url: http://localhost:1234/v1
    privacy_max: P2

  openai:
    type: frontier
    enabled: true
    env_key: OPENAI_API_KEY
    privacy_max: P2

  anthropic:
    type: frontier
    enabled: true
    env_key: ANTHROPIC_API_KEY
    privacy_max: P2

  google:
    type: frontier
    enabled: true
    env_key: GOOGLE_API_KEY
    privacy_max: P2

  openrouter:
    type: broker
    enabled: true
    env_key: OPENROUTER_API_KEY
    privacy_max: P1

  featherless:
    type: broker
    enabled: true
    env_key: FEATHERLESS_API_KEY
    privacy_max: P1

  openhuman:
    type: sidecar
    enabled: false
    base_url: http://127.0.0.1:8787
    env_key: OPENHUMAN_BEARER_TOKEN
    privacy_max: P2
    default_mode: read_only
