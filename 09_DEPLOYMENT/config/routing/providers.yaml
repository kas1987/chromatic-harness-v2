# Canonical provider inventory for Chromatic Harness V2
# Maintained per-machine; edit local copy, never the template directly.

version: 2

providers:
  # ── Local / Zero marginal cost ────────────────────────────────────────────

  ollama_local:
    name: "Ollama (localhost)"
    endpoint: "http://localhost:11434"
    type: "local"
    cost_per_1m_tokens: 0.00
    latency_ms_estimate: 500          # CPU inference; varies wildly
    authentication: none
    models:
      - name: "llama3.2:3b"
        context: 128000
        vram_gb: 2.0
        best_for: [C1]
        machine: laptop
      - name: "qwen2.5-coder:14b"
        context: 128000
        vram_gb: 9.0
        best_for: [C2, C3]
        machine: any
      - name: "qwen3-vl:4b"
        context: 32000
        vram_gb: 3.3
        best_for: [C1]
        machine: laptop

  ollama_remote_desktop:
    name: "Ollama (desktop over LAN)"
    endpoint: "http://desktop.local:11434"
    type: "local_remote"
    cost_per_1m_tokens: 0.00
    latency_ms_estimate: 10           # LAN; desktop must be awake
    authentication: none
    models:
      - name: "llama3.1:8b"
        context: 128000
        vram_gb: 5.0
        best_for: [C1, C2]
        machine: desktop
      - name: "qwen2.5-coder:14b"
        context: 128000
        vram_gb: 9.0
        best_for: [C2, C3]
        machine: desktop
      - name: "gemma2:9b"
        context: 128000
        vram_gb: 6.0
        best_for: [C2, C3]
        machine: desktop
      - name: "gemma2:27b"
        context: 128000
        vram_gb: 14.0    # Q4; Q3 fits ~10GB, may work on 12GB
        best_for: [C3]
        machine: desktop

  lmstudio:
    name: "LM Studio"
    endpoint: "http://localhost:1234"
    type: "local"
    cost_per_1m_tokens: 0.00
    latency_ms_estimate: 200
    authentication: none
    models: []    # populated at runtime from lms api

  # ── Cloud API providers ────────────────────────────────────────────────────

  gemini:
    name: "Google Gemini"
    endpoint: "https://generativelanguage.googleapis.com"
    type: "cloud"
    cost_per_1m_tokens_estimate:
      flash:  { input: 0.075,  output: 0.30 }
      pro:    { input: 1.25,   output: 10.00 }
      ultra:  { input: 5.00,   output: 15.00 }
    latency_ms_estimate: 800
    authentication: env_var    # GEMINI_API_KEY
    models:
      - name: "gemini-2.5-flash"
        context: 1048576
        best_for: [C2, C3]
      - name: "gemini-2.5-pro"
        context: 1048576
        best_for: [C3, C4]
      - name: "gemini-ultra"
        context: 1048576
        best_for: [C4]

  openai:
    name: "OpenAI"
    endpoint: "https://api.openai.com"
    type: "cloud"
    cost_per_1m_tokens_estimate:
      gpt-4o-mini: { input: 0.15, output: 0.60 }
      gpt-4o:      { input: 2.50, output: 10.00 }
      o3-mini:     { input: 1.10, output: 4.40 }
    latency_ms_estimate: 600
    authentication: env_var    # OPENAI_API_KEY

  claude_api:
    name: "Anthropic Claude (API)"
    endpoint: "https://api.anthropic.com"
    type: "cloud"
    cost_per_1m_tokens_estimate:
      haiku:  { input: 0.80,  output: 4.00 }
      sonnet: { input: 3.00,  output: 15.00 }
      opus:   { input: 15.00, output: 75.00 }
    latency_ms_estimate: 1200
    authentication: env_var    # CLAUDE_API_KEY

  runpod:
    name: "RunPod GPU rental"
    endpoint: "user-defined"
    type: "cloud_gpu"
    cost_per_1m_tokens_estimate: null   # billed by GPU-second
    latency_ms_estimate: 3000            # cold-start possible
    authentication: env_var             # RUNPOD_API_KEY

  openrouter:
    name: "OpenRouter (Unified API)"
    endpoint: "https://openrouter.ai/api/v1"
    type: "cloud"
    cost_per_1m_tokens_estimate:
      # Passthrough pricing — same as provider direct
      claude_sonnet:  { input: 3.00,  output: 15.00 }
      gpt_5_4:        { input: 2.50,  output: 15.00 }
      kimi_k2_6:      { input: 1.20,  output: 4.50 }
      gemini_pro:     { input: 1.25,  output: 10.00 }
    latency_ms_estimate: 500
    authentication: env_var    # OPENROUTER_API_KEY
    models:
      - name: "openrouter/auto"
        context: 1048576
        best_for: [C2, C3, C4]
        note: "AI-powered model selection"
      - name: "anthropic/claude-sonnet-4-6"
        context: 1000000
        best_for: [C3, C4]
      - name: "moonshotai/kimi-k2-6"
        context: 262144
        best_for: [C2, C3]
      - name: "openai/gpt-5-4"
        context: 272000
        best_for: [C2, C3]
      - name: "google/gemini-2-5-pro"
        context: 1048576
        best_for: [C3, C4]

  together_ai:
    name: "Together AI (Serverless)"
    endpoint: "https://api.together.xyz/v1"
    type: "cloud"
    cost_per_1m_tokens_estimate:
      llama33_70b:  { input: 0.88, output: 0.88 }
      qwen3_235b:   { input: 0.20, output: 0.60 }
      gemma4_31b:   { input: 0.20, output: 0.50 }
      kimi_k2_6:    { input: 1.20, output: 4.50 }
    latency_ms_estimate: 400
    authentication: env_var    # TOGETHER_API_KEY
    models:
      - name: "meta-llama/Llama-3.3-70B-Instruct-Turbo"
        context: 131072
        best_for: [C3, C4]
      - name: "Qwen/Qwen3-235B-A22B-Instruct-2507"
        context: 262144
        best_for: [C2, C3]
      - name: "google/gemma-4-31B-it"
        context: 262144
        best_for: [C2, C3]
      - name: "moonshotai/Kimi-K2.6"
        context: 262144
        best_for: [C2, C3]

  moonshot:
    name: "Moonshot AI / Kimi"
    endpoint: "https://api.moonshot.ai/v1"
    type: "cloud"
    cost_per_1m_tokens_estimate:
      kimi_k2_6:    { input: 1.20, output: 4.50 }
      kimi_k2_5:    { input: 0.50, output: 2.80 }
    latency_ms_estimate: 800
    authentication: env_var    # MOONSHOT_API_KEY
    models:
      - name: "kimi-k2-6"
        context: 262144
        best_for: [C2, C3]
        note: "Thinking enabled by default"
      - name: "kimi-k2-turbo-preview"
        context: 262144
        best_for: [C1, C2]
        note: "60-100 tok/s, high speed"

  # ── Native / no marginal cost ─────────────────────────────────────────────

  native_claude:
    name: "Native Claude (this session)"
    endpoint: "N/A"
    type: "native"
    cost_per_1m_tokens: 0.00            # subscription already paid
    latency_ms_estimate: 1500
    authentication: session

  # ── Cross-Project Mesh ────────────────────────────────────────────────────

  prism-orchestrator:
    name: "Prism Orchestrator (Dual-Entry Dispatcher)"
    endpoint: "http://127.0.0.1:8000"
    type: "cross_project"
    cost_per_1m_tokens: 0.00            # delegates to backends
    latency_ms_estimate: 2000
    authentication: env_var             # PRISM_ORCHESTRATOR_ENABLED
    models:
      - name: "prism-auto"
        context: 128000
        best_for: [C2, C3]
        note: "Routes to Ollama, Claude CLI, or cloud per policy"
      - name: "ollama-via-prism"
        context: 128000
        best_for: [C1, C2]
        note: "Prism → local Ollama"
      - name: "claude-cli-via-prism"
        context: 999999
        best_for: [C3, C4]
        note: "Prism → Claude CLI daemon"

# Featherless omitted — no API key configured
