# --- Effort level × model routing (2026-06-02) ---
# Reference doc: C:\.00_True_AI\model-effort-routing.md  |  CSV: model-effort-routing.csv
# Thinking tokens bill at output rate. Cost scales with thinking budget.
effort_level_routing:
  principle: "Classify C-level first → pick cheapest T-level → then set minimum effort that satisfies it"
  crossover_note: >
    Sonnet high/max ≈ Opus low for REASONING-BOUND tasks (inference chains, logic steps).
    For KNOWLEDGE-BOUND tasks (creative synthesis, recall, judgment) the crossover fails — use Opus.
    At the crossover: Opus low (~$0.10-0.25) is cheaper than Sonnet max (~$0.30-0.80). Prefer Opus low.

  haiku:
    effort_impact: none  # no extended thinking; effort level is a no-op
    dispatch_effort: low  # always dispatch at low; high/max wastes overhead

  sonnet:
    low:   {c_level: "C2",    t_level: "T3", est_cost: "$0.02-0.05",  use_for: "quick edits, fast drafts, boilerplate"}
    medium:{c_level: "C2-C3", t_level: "T3", est_cost: "$0.05-0.15",  use_for: "standard coding, PR review, test gen, known-pattern debug"}
    high:  {c_level: "C3-C4", t_level: "T3", est_cost: "$0.15-0.40",  use_for: "deep reasoning, multi-file debug, architecture review"}
    max:   {c_level: "C4",    t_level: "T3-T4", est_cost: "$0.30-0.80", use_for: "exhaustive analysis, pre-mortem; prefer Opus low at crossover"}

  opus:
    low:   {c_level: "C4", t_level: "T4", est_cost: "$0.10-0.25",  use_for: "creative synthesis, knowledge-heavy judgment — CHEAPEST at C4 crossover"}
    medium:{c_level: "C4", t_level: "T4", est_cost: "$0.20-0.60",  use_for: "high-trust decisions, novel architecture"}
    high:  {c_level: "C4", t_level: "T4", est_cost: "$0.50-1.50",  use_for: "security audits, complex pre-mortems"}
    max:   {c_level: "C4", t_level: "T4", est_cost: "$1.00-3.00",  use_for: "mission-critical one-shots — gate required"}

  dispatch_rules:
    - "Subagents inherit session effort by default — OVERRIDE explicitly per agent to minimum viable effort"
    - "Never dispatch Haiku at high/max — no thinking capability, pure overhead"
    - "At C3-C4 crossover: Opus low beats Sonnet max on both cost and quality"
    - "Opus max requires documented justification at dispatch site"
    - "Thinking improves inference (reasoning chains), NOT recall (knowledge, creativity) — route accordingly"

# --- Best-practice routing heuristics (all environments) ---
routing_heuristics:
  - "No LLM for ls, grep, git status, jq-only transforms"
  - "Subagent >70% verbatim reference material → tier 0-1"
  - "Novel architecture / unfamiliar code → tier 3-4"
  - "Classify COMPLEXITY (C-level) first, then pick cheapest provider T-level that satisfies it"
  - "Prefer real codegraph_impact fan-out over keyword guesses when scoring complexity"
  - "Gen new multi-provider features → POST /api/delegate (not ad-hoc ILlmClient)"
  - "preferredProvider set → skips gen routing-matrix (explicit override only)"
  - "Cache discipline: route via subagents/hooks; avoid mid-session parent handoffs that bust cache"

