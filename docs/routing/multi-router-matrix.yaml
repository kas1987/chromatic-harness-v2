# --- Router implementations: which engine is authoritative where ----------
# Resolves the prior doctrine drift: the shell stack is the GLOBAL DEFAULT;
# Chromatic Harness v2 supersedes it locally with a typed Python router that
# separates task COMPLEXITY (C-levels) from provider COST/availability (T-levels).
router_implementations:
  global_default:
    engine: "shell"
    files:
      - "~/.claude/hooks/model-router.sh"
      - "~/.claude/config/router-patterns.json"
      - "~/.claude/config/provider-tiers.json"
    model: "single 0–4 provider-tier scale (cost == capability collapsed)"
    scope: "ad-hoc / non-harness Claude Code sessions on C:"
    status: "active (legacy) — forward direction is the v2 Python router"
  harness_v2:
    engine: "python"
    entrypoint: "C:/Users/kas41/chromatic-harness-v2/02_RUNTIME/router/gate.py"
    wired_via: "chromatic-harness-v2/.claude/settings.json PreToolUse → Agent"
    modules:
      context_detector: "laptop/desktop/GPU + local+remote Ollama probe"
      complexity_classifier: "task → C1–C4 (keyword + codegraph_impact fan-out)"
      provider_selector: "C-level × privacy × budget × machine → ranked T0–T4"
      budget: "weekly per-provider spend cap"
      privacy: "P-class gate (block P5 from cloud except native Claude)"
    spec: "chromatic-harness-v2/GOVERNANCE_AND_ROUTING_ARCHITECTURE.md"
    supersedes: ["model-router.sh", "router-patterns.json", "provider-tiers.json"]
    status: "active within chromatic-harness-v2; reference design for migrating the global default"
  # C-levels (complexity, capability-first) vs T-levels (cost/availability).
  # The v2 router decides C FIRST, then picks the cheapest provider whose T-level
  # can satisfy C under the current speed_mode / budget / privacy constraints.
  c_levels:
    C1: "mechanical — format/convert/extract, single-step, no reasoning"
    C2: "structured — single-file change, code review, smoke test (≤3 files)"
    C3: "reasoning — multi-file integration, root-cause, architecture (≤10 files)"
    C4: "creative/novel — brainstorm, design, research synthesis (unbounded)"
  t_levels:
    T0: "local free — Ollama / LM Studio (always preferred)"
    T1: "cheap API — gpt-4o-mini (Featherless unavailable: no key)"
    T2: "standard API — Gemini 2.5-flash, gpt-4o"
    T3: "premium API — Gemini 2.5-pro, Claude sonnet"
    T4: "ultra/native — Claude opus, native Claude (no marginal cost in-session)"

