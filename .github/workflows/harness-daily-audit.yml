name: Harness Daily Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Run daily Harness audit
        env:
          CHROMATIC_LOCK_TIMEOUT_RATE_THRESHOLD: "0.05"
          CHROMATIC_LOCK_WAIT_P95_THRESHOLD_MS: "1500"
          CHROMATIC_LOCK_MIN_SAMPLE_SIZE: "20"
        run: |
          python scripts/daily_harness_audit.py --root . --report
      - name: Run parallel maintenance prune
        run: |
          python scripts/parallel_maintenance.py
      - name: Upload audit reports
        uses: actions/upload-artifact@v4
        with:
          name: harness-audit
          path: .agents/audits/
