name: CI

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: |
          pip install ruff
          ruff check 02_RUNTIME/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          CHROMATIC_DB_PATH: ":memory:"
