name: CI

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Agent operations guard (mandatory docs)
        run: python scripts/check_agent_operations.py

      - name: Lint
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type check
        run: |
          pip install mypy types-PyYAML
          mypy src/ --config-file mypy.ini
          mypy 02_RUNTIME/router/ 02_RUNTIME/memory/ 02_RUNTIME/api/ --config-file mypy.ini

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov --cov-report=term
        env:
          CHROMATIC_DB_PATH: ":memory:"

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore
