name: CI

on:
  push:
    branches-ignore:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    # The router/provider tests assert local-provider routing (native_claude), which is
    # gated by a runtime probe (claude on PATH) absent on a cloud runner. Declare the
    # native-claude relay so the routing LOGIC is tested deterministically, matching dev.
    env:
      NATIVE_CLAUDE_RELAY_URL: "http://localhost:11434"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Several governance/intake checks shell out to `bd` (beads). Install it so the
      # checks run for real on the runner instead of FileNotFound-ing.
      - name: Install beads (bd)
        run: |
          curl -sSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash || true
          for d in "$HOME/.local/bin" "$HOME/.beads/bin" /usr/local/bin; do
            [ -x "$d/bd" ] && echo "$d" >> "$GITHUB_PATH"
          done
          command -v bd && bd --version || echo "bd not on PATH (checks will fail-open)"

      # These two-log/intake JSONLs are runtime-generated and gitignored, so a clean
      # CI checkout lacks them. Seed empty placeholders so the mandatory-docs guard
      # checks structure without depending on runtime artifacts.
      - name: Seed runtime log placeholders
        run: |
          mkdir -p 07_LOGS_AND_AUDIT/execution 07_LOGS_AND_AUDIT/traces 07_LOGS_AND_AUDIT/decisions
          touch 07_LOGS_AND_AUDIT/execution/execution.jsonl \
                07_LOGS_AND_AUDIT/traces/traces.jsonl \
                07_LOGS_AND_AUDIT/decisions/decision_log.jsonl \
                07_LOGS_AND_AUDIT/intake_queue.jsonl

      - name: Agent operations guard (mandatory docs)
        run: python scripts/check_agent_operations.py

      - name: Hook audit (no HIGH findings)
        run: |
          python scripts/audit_hooks.py --json > hook_audit.json
          python -c "import json; d=json.load(open('hook_audit.json')); high=[f for f in d.get('findings',[]) if f.get('severity')=='HIGH']; assert not high, high"

      - name: Intake close-loop validation (dry-run)
        run: python scripts/validate_intake_loop.py

      - name: MCP context audit (fixture baseline)
        run: |
          python scripts/audit_mcp_context.py \
            --mcps-path tests/fixtures/mcp_minimal \
            --profile harness_dev

      - name: Lint
        run: |
          pip install ruff
          ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

      - name: Type check
        run: |
          pip install mypy types-PyYAML
          mypy src/ --config-file mypy.ini
          mypy 02_RUNTIME/router/ 02_RUNTIME/memory/ 02_RUNTIME/api/ --config-file mypy.ini

      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src/chromatic_router --cov-report=term --cov-fail-under=50
        env:
          CHROMATIC_DB_PATH: ":memory:"

      - name: Concurrency regression suite
        run: |
          pytest tests/test_parallel_sessions_e2e.py tests/test_lock_contention.py tests/test_chromatic_mcp_handlers.py -q

      - name: Generate lock metrics rollup
        env:
          CHROMATIC_LOCK_TIMEOUT_RATE_THRESHOLD: "0.05"
          CHROMATIC_LOCK_WAIT_P95_THRESHOLD_MS: "500"
          CHROMATIC_LOCK_MIN_SAMPLE_SIZE: "20"
        run: python scripts/lock_metrics_rollup.py --lookback-days 7 --write

      - name: Print lock metrics summary
        run: python scripts/lock_metrics_gate.py

      - name: Enforce lock timeout gate (sample-aware)
        env:
          CHROMATIC_LOCK_TIMEOUT_RATE_THRESHOLD: "0.05"
          CHROMATIC_LOCK_MIN_SAMPLE_SIZE: "20"
        run: python scripts/lock_metrics_gate.py

      - name: Upload lock metrics artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lock-metrics-linux
          path: .agents/audits/locks/
          if-no-files-found: error

      - name: Upload coverage report
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore

      - name: Git pipeline plan dry-run (PR only)
        if: github.event_name == 'pull_request'
        run: |
          python scripts/workflow_git.py plan --confidence 0 --tests-passed \
            > workflow_git_plan.json
          python -c "import json; json.load(open('workflow_git_plan.json'))"

      - name: PR governance metadata + artifact scope gate
        if: github.event_name == 'pull_request'
        env:
          CHROMATIC_PR_MAX_CHANGED_FILES: "25"
          CHROMATIC_PR_MAX_INSERTIONS: "800"
          CHROMATIC_PR_MAX_DELETIONS: "400"
          CHROMATIC_PR_SIZE_WARN_RATIO: "0.70"
        run: python scripts/validate_pr_governance.py

      - name: Upload git plan artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: workflow-git-plan
          path: workflow_git_plan.json
          if-no-files-found: error

  concurrency-windows-matrix:
    name: Concurrency Suite (Windows, py${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run concurrency suite
        run: |
          python -m pytest tests/test_parallel_sessions_e2e.py tests/test_lock_contention.py tests/test_chromatic_mcp_handlers.py -q

      - name: Generate lock metrics rollup
        env:
          CHROMATIC_LOCK_TIMEOUT_RATE_THRESHOLD: "0.05"
          CHROMATIC_LOCK_WAIT_P95_THRESHOLD_MS: "500"
          CHROMATIC_LOCK_MIN_SAMPLE_SIZE: "20"
        run: python scripts/lock_metrics_rollup.py --lookback-days 7 --write

      - name: Print lock metrics summary
        run: python scripts/lock_metrics_gate.py

      - name: Enforce lock timeout gate (sample-aware)
        env:
          CHROMATIC_LOCK_TIMEOUT_RATE_THRESHOLD: "0.05"
          CHROMATIC_LOCK_MIN_SAMPLE_SIZE: "20"
        run: python scripts/lock_metrics_gate.py

      - name: Upload lock metrics artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: lock-metrics-windows-py${{ matrix.python-version }}
          path: .agents/audits/locks/
          if-no-files-found: error
