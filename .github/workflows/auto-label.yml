name: Auto-label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}  # pragma: allowlist secret

      - uses: actions/labeler@v5
        with:
          repo-token: ${{ steps.app-token.outputs.token }}  # pragma: allowlist secret
          sync-labels: true
