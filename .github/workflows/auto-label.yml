name: Auto-label PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        continue-on-error: true
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}  # pragma: allowlist secret

      - uses: actions/labeler@v6
        with:
          repo-token: ${{ steps.app-token.outputs.token || github.token }}  # pragma: allowlist secret
          sync-labels: true

      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token || github.token }}  # pragma: allowlist secret
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --auto --squash \
            --repo "${{ github.repository }}" || true
