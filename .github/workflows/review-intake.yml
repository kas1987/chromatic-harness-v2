name: Chromatic Review Intake

on:
  pull_request_review:
    types: [submitted, edited, dismissed]
  pull_request_review_comment:
    types: [created, edited, deleted]
  pull_request:
    types: [synchronize]
  issue_comment:
    types: [created, edited]
  check_run:
    types: [completed]
  workflow_run:
    types: [completed]

permissions:
  contents: read
  pull-requests: read
  checks: read

defaults:
  run:
    shell: bash

jobs:
  ingest-review:
    if: github.event_name != 'issue_comment' || github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ensure review intake folders exist
        run: |
          mkdir -p 07_LOGS_AND_AUDIT/review_intake/locks
          touch 07_LOGS_AND_AUDIT/review_intake/findings.jsonl
          test -f 07_LOGS_AND_AUDIT/review_intake/queue.json || echo '{"items":[]}' > 07_LOGS_AND_AUDIT/review_intake/queue.json

      - name: Ingest GitHub review event
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_EVENT_PATH: ${{ github.event_path }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          python scripts/review_intake.py \
            --event-name "$GITHUB_EVENT_NAME" \
            --event-path "$GITHUB_EVENT_PATH" \
            --findings 07_LOGS_AND_AUDIT/review_intake/findings.jsonl \
            --queue 07_LOGS_AND_AUDIT/review_intake/queue.json \
            --state 07_LOGS_AND_AUDIT/review_intake/state.json

      # State is published as a workflow artifact rather than pushed to a protected
      # branch. A downstream collector (scripts/review_intake_central_collector.py)
      # ingests these artifacts; this keeps the default branch immutable from CI.
      - name: Publish intake artifacts
        uses: actions/upload-artifact@v4
        with:
          name: review-intake-state-${{ github.run_id }}
          path: 07_LOGS_AND_AUDIT/review_intake/
          if-no-files-found: warn
          retention-days: 14
