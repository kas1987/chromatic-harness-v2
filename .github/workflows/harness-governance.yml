name: Harness governance

on:
  pull_request:
    paths:
      - "AGENT_OPERATIONS.md"
      - "AGENTS.md"
      - "CLAUDE.md"
      - ".cursor/**"
      - ".claude/**"
      - "scripts/**"
      - "docs/**"
      - "02_RUNTIME/**"
      - "tests/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  governance:
    runs-on: ubuntu-latest
    # See ci.yml: declare the native-claude relay so router/provider tests run
    # deterministically on a cloud runner (no local `claude` binary).
    env:
      NATIVE_CLAUDE_RELAY_URL: "http://localhost:11434"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Install beads (bd)
        run: |
          set -euo pipefail
          curl -sSL https://raw.githubusercontent.com/steveyegge/beads/main/scripts/install.sh | bash
          # Include $HOME/go/bin: when GitHub releases rate-limit (HTTP 403) the installer
          # falls back to `go install`, which lands bd there — not in the release dirs.
          for d in "$HOME/.local/bin" "$HOME/.beads/bin" /usr/local/bin "$HOME/go/bin" /home/runner/go/bin; do
            [ -x "$d/bd" ] && echo "$d" >> "$GITHUB_PATH" && export PATH="$d:$PATH"
          done
          # Hard-fail if bd did not land on PATH: governance checks must run for real,
          # not fail-open. (codex review #3330604912)
          command -v bd && bd --version

      - name: Seed runtime log placeholders
        run: |
          mkdir -p 07_LOGS_AND_AUDIT/execution 07_LOGS_AND_AUDIT/traces 07_LOGS_AND_AUDIT/decisions
          touch 07_LOGS_AND_AUDIT/execution/execution.jsonl \
                07_LOGS_AND_AUDIT/traces/traces.jsonl \
                07_LOGS_AND_AUDIT/decisions/decision_log.jsonl \
                07_LOGS_AND_AUDIT/intake_queue.jsonl

      - name: Governance stack
        run: python scripts/validate_governance_stack.py

      - name: Daily audit (strict)
        run: python scripts/daily_harness_audit.py --root . --strict

      - name: Workflow token governance
        run: python scripts/validate_workflow_token_governance.py

      - name: Router and workflow tests
        run: |
          pytest tests/test_workflow_guardrails.py tests/test_self_heal_cycle.py -q
          pytest tests/test_complexity_and_routing.py tests/test_openrouter_broker_policy.py tests/test_context_detector.py tests/test_provider_matrix.py -q
