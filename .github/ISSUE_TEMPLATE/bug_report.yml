name: Bug Report
description: Something is broken in the harness
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `bd ready`
        2. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Router / Gate
        - CI / Governance
        - Hooks
        - Budget / Token governance
        - Intake / Queue
        - Observability
        - Other
    validations:
      required: true
