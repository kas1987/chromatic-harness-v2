version: 0.1.0
rules:
  adapter_only:
    required: true
    statement: Claude commands must invoke or summarize harness authority, not replace it.
  no_direct_merge:
    required: true
    forbidden_for_all_commands: true
  no_hidden_dispatch:
    required: true
    forbidden_for_all_commands: true
  mutation_requires_authority:
    required: true
    gates: [confidence, lease]
  promotion_requires_verifier:
    required: true
    applies_to: [T3, T4, ship, release]
  recovery_defaults_to_inspect:
    required: true
  command_registry_required:
    required: true
required_docs:
  - docs/governance/CLAUDE_WORKFLOW_ADAPTER_POLICY.md
  - docs/governance/CLAUDE_COMMAND_MATRIX.md
  - docs/governance/CLAUDE_AUTHORITY_MODEL.md
  - docs/governance/CLAUDE_RECOVERY_PROCEDURES.md
  - docs/governance/CLAUDE_COMMAND_SPEC.md
required_commands:
  - /go
  - /audit
  - /status
  - /ship
  - /recover
  - /queue
  - /explain
forbidden_logic_terms:
  - direct_merge
  - skip_tests
  - skip_verifier
  - skip_collision
  - hidden_agent_dispatch
  - direct_file_mutation
  - direct_ship
  - approval_decision
  - release_override
  - state_mutation
  - queue_claim
  - force_delete
  - unapproved_override
  - arbitrary_reprioritization
  - hidden_claim
  - decision_override
